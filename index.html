<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADILOUD - Montres de luxe</title>
  <link rel="stylesheet" href="style.css">
  <!-- Police élégante via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <h1 class="logo">ADILOUD</h1>
    <nav class="nav-links">
      <button class="nav-btn" data-page="home">Accueil</button>
      <button class="nav-btn" data-page="shop">Boutique</button>
      <button class="nav-btn cart-btn" data-page="cart">
        Panier (<span id="cart-count">0</span>)
      </button>
    </nav>
  </header>

  <!-- Section Hero (Accueil) -->
  <section id="home-page" class="page active">
    <div class="hero">
      <div class="hero-content">
        <h2>L’élégance intemporelle</h2>
        <p>Découvrez notre collection de montres de luxe, conçues pour l'excellence.</p>
        <button class="cta gold-btn" data-page="shop">Voir la collection</button>
      </div>
    </div>

    <!-- Produits mis en avant (aperçu sur l'accueil) -->
    <div class="featured">
      <h3>Nos icônes</h3>
      <div class="product-grid" id="featured-products"></div>
    </div>
  </section>

  <!-- Page Boutique -->
  <section id="shop-page" class="page">
    <h2 class="page-title">Notre collection</h2>
    <div class="product-grid" id="all-products"></div>
  </section>

  <!-- Page Détail produit (modal-like intégrée) -->
  <section id="detail-page" class="page">
    <button class="back-btn gold-btn" data-page="shop">← Retour</button>
    <div class="product-detail" id="product-detail-container"></div>
  </section>

  <!-- Page Panier -->
  <section id="cart-page" class="page">
    <h2 class="page-title">Votre panier</h2>
    <div id="cart-items-container">
      <p class="empty-cart">Votre panier est vide.</p>
    </div>
    <div id="cart-summary" style="display: none;">
      <p>Total : <strong id="cart-total">0</strong> MAD</p>
      <button id="checkout-btn" class="gold-btn">Commander sur WhatsApp</button>
    </div>
  </section>

  <!-- Bouton WhatsApp flottant -->
  <a href="https://wa.me/212714587749" target="_blank" class="floating-whatsapp" aria-label="WhatsApp" id="floating-wa">

    <span class="wa-tooltip">WhatsApp</span>
  </a>

  <!-- Pied de page -->
  <footer>
    <p>© 2025 ADILOUD - Tous droits réservés.</p>
    <a href="https://instagram.com" target="_blank" class="instagram-link" aria-label="Instagram">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20px" height="20px"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
    </a>
  </footer>

  <script src="script.js"></script>
</body>
        </html>
